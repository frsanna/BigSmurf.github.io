<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquor Lab</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>Liquor Lab</h1>
      <p>Quick calculator for estimated final alcohol by volume.</p>
    </header>

    <section class="panel">
      <form id="liquor-form" novalidate>
        <label for="gAlcol">Alcohol Strength (degrees)</label>
        <input type="number" id="gAlcol" min="0" step="1" value="95" required>

        <label for="qAlcol">Alcohol Volume (ml)</label>
        <input type="number" id="qAlcol" min="0" step="1" placeholder="e.g. 700" required>

        <label for="qWater">Water Volume (ml)</label>
        <input type="number" id="qWater" min="0" step="1" placeholder="e.g. 300" required>

        <label for="qSugar">Sugar (g)</label>
        <input type="number" id="qSugar" min="0" step="1" placeholder="e.g. 250" required>

        <button type="submit">Calculate</button>
      </form>
    </section>

    <section class="result-panel" aria-live="polite">
      <div class="result-head">
        <span class="label">Estimated ABV</span>
        <span id="result">-</span>
      </div>
      <div class="meter">
        <div id="meter-fill" class="meter-fill"></div>
      </div>
      <p id="note" class="note">Insert values and run calculation.</p>
    </section>
  </main>

  <script>
    const form = document.getElementById("liquor-form");
    const result = document.getElementById("result");
    const note = document.getElementById("note");
    const meterFill = document.getElementById("meter-fill");

    /**
     * Reads a numeric input value by id.
     * @param {string} id - Input element id.
     * @returns {number}
     */ 
    function readValue(id) {
      return Number(document.getElementById(id).value);
    }

    /**
     * Maps ABV value to a short profile message.
     * @param {number} degree - Estimated final ABV.
     * @returns {string}
     */
    function getProfileMessage(degree) {
      if (degree < 20) return "Light profile: smooth and approachable.";
      if (degree < 30) return "Balanced profile: nice for after-dinner sipping.";
      if (degree < 40) return "Strong profile: bold and intense.";
      return "Very strong profile: handle with respect.";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const gAlcol = readValue("gAlcol");
      const qAlcol = readValue("qAlcol");
      const qWater = readValue("qWater");
      const qSugar = readValue("qSugar") / 1.5879;

      const denominator = qAlcol + qWater + qSugar;
      if (!Number.isFinite(denominator) || denominator <= 0) {
        result.textContent = "-";
        note.textContent = "Please insert valid numeric values.";
        meterFill.style.width = "0%";
        return;
      }

      const degree = Math.round((gAlcol * qAlcol) / denominator);
      const safeDegree = Math.max(0, Math.min(degree, 80));

      result.textContent = `${safeDegree}°`;
      note.textContent = getProfileMessage(safeDegree);
      meterFill.style.width = `${(safeDegree / 80) * 100}%`;
    });
  </script>
</body>
</html>
