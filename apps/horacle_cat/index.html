<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horacle Cat</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Horacle Cat</h1>
      <p class="sub">Ask a question. Accept the judgment. Move on with your life.</p>
    </header>

    <section class="stage">
      <label for="question" class="sub">Your question</label>
      <input id="question" class="prompt" type="text" placeholder="Example: Should I merge this branch?" autocomplete="off">
      <p id="question-tip" class="tip" aria-live="polite"></p>

      <div class="result">
        <img id="cat-img" src="" alt="Horacle Cat answer">
        <div class="meta">
          <div id="answer" class="answer-yes">YES</div>
          <div class="actions">
            <button id="refresh" type="button">Reveal Verdict</button>
            <button id="random-q" type="button">Random Question</button>
          </div>
        </div>
      </div>
    </section>

    <footer class="foot">
      100% scientific process. No refunds.
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
