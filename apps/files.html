<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Files</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #0f1116;
      --panel: #171c27;
      --line: #2a3344;
      --text: #ecf1f8;
      --muted: #9fb0c8;
      --accent: #4cc9f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 1rem;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0; font-size: 1.5rem; }
    p { color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .panel {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 1rem;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    ul { list-style: none; margin: .8rem 0 0; padding: 0; }
    li {
      border-top: 1px solid var(--line);
      padding: .55rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .8rem;
      flex-wrap: wrap;
    }
    li:first-child { border-top: none; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>App File Index</h1>
    <p id="subtitle">Loading...</p>

    <section class="panel">
      <div class="header">
        <strong id="path-title">Path: -</strong>
        <a href="lab-archive.html">Back to lab archive</a>
      </div>
      <ul id="list"></ul>
      <p id="error" class="muted"></p>
    </section>
  </main>

  <script>
    /** GitHub repository owner used for dynamic content listing. */
    const REPO_OWNER = "frsanna";
    /** GitHub repository name used for dynamic content listing. */
    const REPO_NAME = "BigSmurf.github.io";
    /** Git branch used for content listing. */
    const REPO_BRANCH = "master";

    const params = new URLSearchParams(window.location.search);
    const appPath = params.get("path") || "";

    const subtitle = document.getElementById("subtitle");
    const pathTitle = document.getElementById("path-title");
    const list = document.getElementById("list");
    const errorNode = document.getElementById("error");

    /**
     * Escapes basic HTML entities.
     * @param {string} value - Raw string.
     * @returns {string}
     */
    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    /**
     * Returns API URL for a given app subpath.
     * @param {string} relativePath - App directory relative path.
     * @returns {string}
     */
    function makeApiUrl(relativePath) {
      const contentPath = `apps/${relativePath}`;
      return `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${contentPath}?ref=${encodeURIComponent(REPO_BRANCH)}`;
    }

    /**
     * Builds a local href from app path and file name.
     * @param {string} relativePath - Base app path.
     * @param {string} fileName - Entry name.
     * @returns {string}
     */
    function makeLocalHref(relativePath, fileName) {
      return `${relativePath}/${fileName}`;
    }

    /**
     * Renders one directory entry row.
     * @param {{name: string, type: string, size?: number}} entry - GitHub API entry.
     * @returns {HTMLLIElement}
     */
    function renderEntry(entry) {
      const li = document.createElement("li");
      const icon = entry.type === "dir" ? "📁" : "📄";
      const safeName = escapeHtml(entry.name);
      const href = makeLocalHref(appPath, entry.name);
      const sizeText = entry.type === "file" && Number.isFinite(entry.size)
        ? `${entry.size} bytes`
        : "directory";

      li.innerHTML = `
        <a href="${href}">${icon} ${safeName}</a>
        <span class="muted">${sizeText}</span>
      `;

      return li;
    }

    /**
     * Loads and renders directory entries from GitHub API.
     * @returns {Promise<void>}
     */
    async function loadDirectory() {
      if (!appPath) {
        subtitle.textContent = "Missing path query parameter.";
        errorNode.textContent = "Use files.html?path=your_app_folder";
        return;
      }

      pathTitle.textContent = `Path: apps/${appPath}`;
      subtitle.textContent = `Repository: ${REPO_OWNER}/${REPO_NAME} (${REPO_BRANCH})`;

      try {
        const response = await fetch(makeApiUrl(appPath));
        if (!response.ok) {
          throw new Error(`GitHub API returned ${response.status}`);
        }

        const data = await response.json();
        if (!Array.isArray(data)) {
          throw new Error("Unexpected API payload.");
        }

        list.innerHTML = "";

        data
          .slice()
          .sort((a, b) => {
            if (a.type !== b.type) {
              return a.type === "dir" ? -1 : 1;
            }
            return a.name.localeCompare(b.name);
          })
          .forEach((entry) => {
            list.appendChild(renderEntry(entry));
          });
      } catch (error) {
        list.innerHTML = "";
        errorNode.textContent = `Unable to load file list: ${error.message}`;
      }
    }

    loadDirectory();
  </script>
</body>
</html>
